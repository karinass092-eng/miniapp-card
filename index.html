<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Product Card</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
    body{
      font-family: Arial, sans-serif;
      background:#f3f3f3;
      padding:20px;
      margin:0;
    }

    .card{
      background:white;
      border-radius:10px;
      padding:20px;
      box-shadow:0 0 10px rgba(0,0,0,0.1);
    }

    #photo{
      width:100%;
      border-radius:8px;
      margin-bottom:10px;
      display:block;
      min-height:120px;
      object-fit:cover;
      background:#eee;
    }

    .title{
      font-size:22px;
      font-weight:bold;
      margin-top:10px;
    }

    .description{
      margin-top:10px;
      color:#555;
      white-space:pre-wrap;
    }

    .price{
      margin-top:10px;
      font-size:20px;
      font-weight:bold;
    }

    .button{
      margin-top:15px;
      padding:15px;
      border-radius:8px;
      text-align:center;
      font-weight:bold;
      cursor:pointer;
    }

    .approve{
      background:#2ecc71;
      color:white;
    }

    .reject{
      background:#e74c3c;
      color:white;
    }

    .debug{
      margin-top:12px;
      font-size:12px;
      color:#888;
      word-break:break-word;
    }
  </style>
</head>
<body>

  <div class="card">
    <img id="photo" src="" alt="photo" />
    <div class="title" id="title">Loading...</div>
    <div class="description" id="description"></div>
    <div class="price" id="price"></div>

    <div class="button approve" onclick="approve()">Approve</div>
    <div class="button reject" onclick="reject()">Reject</div>

    <div class="debug" id="debug"></div>
  </div>

  <script>
    const tg = window.Telegram?.WebApp;
    if (tg) tg.expand();

    const titleEl = document.getElementById("title");
    const descriptionEl = document.getElementById("description");
    const priceEl = document.getElementById("price");
    const photoEl = document.getElementById("photo");
    const debugEl = document.getElementById("debug");

    const params = new URLSearchParams(window.location.search);
    const card_id = params.get("card_id");

    debugEl.innerText = "URL: " + window.location.href + "\ncard_id: " + (card_id || "NULL");

    function showError(message) {
      titleEl.innerText = "Ошибка";
      descriptionEl.innerText = message;
      priceEl.innerText = "";
    }

    fetch("https://markusha.app.n8n.cloud/webhook/get-card-new?id=" + encodeURIComponent(card_id || ""))
      .then((res) => {
        if (!res.ok) {
          throw new Error("HTTP " + res.status);
        }
        return res.json();
      })
      .then((data) => {
        debugEl.innerText += "\nDATA: " + JSON.stringify(data);

        titleEl.innerText = data.title || "Нет title";
        descriptionEl.innerText = data.description || "Нет description";
        priceEl.innerText = data.price ? "€ " + data.price : "Нет price";

        if (data.photo) {
          photoEl.src = data.photo;
        } else {
          photoEl.style.display = "none";
        }
      })
      .catch((err) => {
        showError(String(err));
        debugEl.innerText += "\nERROR: " + String(err);
      });

    function approve() {
      fetch("https://markusha.app.n8n.cloud/webhook/approve?id=" + encodeURIComponent(card_id || ""))
        .then(() => {
          if (tg) tg.close();
        })
        .catch((err) => {
          alert("Approve error: " + err);
        });
    }

    function reject() {
      fetch("https://markusha.app.n8n.cloud/webhook/reject?id=" + encodeURIComponent(card_id || ""))
        .then(() => {
          if (tg) tg.close();
        })
        .catch((err) => {
          alert("Reject error: " + err);
        });
    }
  </script>

</body>
</html>
