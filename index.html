<script>
  let card = {};

  function getCardData() {
    const params = new URLSearchParams(window.location.search);
    const dataParam = params.get('data');

    if (!dataParam) {
      return {
        card_id: '',
        title: 'No card data',
        description: '',
        price: '',
        condition: 'Used - Good',
        category: ''
      };
    }

    try {
      return JSON.parse(dataParam);
    } catch (e1) {
      try {
        return JSON.parse(decodeURIComponent(dataParam));
      } catch (e2) {
        console.error('Parse error:', e1, e2);
        return {
          card_id: '',
          title: 'Invalid card data',
          description: '',
          price: '',
          condition: 'Used - Good',
          category: ''
        };
      }
    }
  }

  function fillForm() {
    card = getCardData();

    document.getElementById('title').innerText = card.title || '';
    document.getElementById('description').value = card.description || '';
    document.getElementById('price').value = card.price || '';
    document.getElementById('category').value = card.category || '';

    const conditionEl = document.getElementById('condition');
    conditionEl.value = card.condition || 'Used - Good';

    document.getElementById('meta').innerText = 'card_id: ' + (card.card_id || '');
  }

  async function approveCard() {
    const payload = {
      card_id: card.card_id,
      title: card.title,
      description: document.getElementById('description').value,
      price: document.getElementById('price').value,
      condition: document.getElementById('condition').value,
      category: document.getElementById('category').value,
      status: 'approved'
    };

    document.getElementById('status').innerText = 'Sending approve...';

    try {
      const res = await fetch('https://ТВОЙ-N8N-ДОМЕН/webhook/approve-card', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      console.log(text);
      document.getElementById('status').innerText = 'Approved';
    } catch (err) {
      console.error(err);
      document.getElementById('status').innerText = 'Approve error';
    }
  }

  async function rejectCard() {
    const payload = {
      card_id: card.card_id,
      status: 'rejected'
    };

    document.getElementById('status').innerText = 'Sending reject...';

    try {
      const res = await fetch('https://ТВОЙ-N8N-ДОМЕН/webhook/reject-card', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(payload)
      });

      const text = await res.text();
      console.log(text);
      document.getElementById('status').innerText = 'Rejected';
    } catch (err) {
      console.error(err);
      document.getElementById('status').innerText = 'Reject error';
    }
  }

  fillForm();
</script>
