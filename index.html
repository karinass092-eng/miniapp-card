<script>
const params = new URLSearchParams(window.location.search);
const card_id = params.get("card_id");

document.getElementById("title").innerText = "Loading...";

if (!card_id) {
  document.getElementById("title").innerText = "Ошибка: card_id не передан";
  document.getElementById("description").innerText = window.location.href;
} else {
  fetch("https://markusha.app.n8n.cloud/webhook/get-card-new?id=" + encodeURIComponent(card_id))
    .then(res => {
      if (!res.ok) {
        throw new Error("HTTP " + res.status);
      }
      return res.json();
    })
    .then(data => {
      console.log("CARD DATA:", data);

      document.getElementById("photo").src = data.photo || "";
      document.getElementById("title").innerText = data.title || "Нет title";
      document.getElementById("description").innerText = data.description || "Нет description";
      document.getElementById("price").innerText = data.price ? "€ " + data.price : "Нет price";
    })
    .catch(err => {
      document.getElementById("title").innerText = "Ошибка загрузки";
      document.getElementById("description").innerText = String(err);
      document.getElementById("price").innerText = "card_id = " + card_id;
    });
}

function approve() {
  fetch("https://markusha.app.n8n.cloud/webhook/approve?id=" + encodeURIComponent(card_id || ""))
    .then(() => Telegram.WebApp.close())
    .catch(err => alert("Approve error: " + err));
}

function reject() {
  fetch("https://markusha.app.n8n.cloud/webhook/reject?id=" + encodeURIComponent(card_id || ""))
    .then(() => Telegram.WebApp.close())
    .catch(err => alert("Reject error: " + err));
}
</script>
